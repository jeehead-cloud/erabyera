<!-- @dsCard group="Game Session" viewport="1440x820" name="Game Session HUD" subtitle="Core gameplay HUD — map, resources, unit inspector, action bar" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Atlas — Game Session</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0;height:100%;background:var(--surface-canvas);overflow:hidden;}
  #root{height:100%;}
  .lucide-icon{width:16px;height:16px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Panel, StatMeter, StatusPill, Badge, Toast, Tooltip } = window.AtlasDesignSystem_b2128a;

function toKebab(name) {
  return name.replace(/([a-z0-9])([A-Z])/g, "$1-$2").replace(/([A-Za-z])([0-9])/g, "$1-$2").toLowerCase();
}

function Icon({ name, size = 16 }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const i = document.createElement("i");
      i.setAttribute("data-lucide", toKebab(name));
      i.style.width = size + "px";
      i.style.height = size + "px";
      ref.current.appendChild(i);
      window.lucide.createIcons({ icons: window.lucide.icons, attrs: { width: size, height: size, "stroke-width": 1.75 }, root: ref.current });
    }
  }, [name, size]);
  return <span ref={ref} style={{display:"inline-flex", color:"inherit"}} />;
}

function TerrainMap() {
  const tiles = [];
  const cols = 26, rows = 15;
  const palette = ["var(--olive-2)", "var(--olive-3)", "var(--gray-4)", "var(--gold-2)"];
  for (let i = 0; i < cols * rows; i++) {
    const seed = (i * 37) % palette.length;
    tiles.push(<div key={i} style={{ background: palette[seed] }} />);
  }
  return (
    <div style={{
      position: "absolute", inset: 0,
      display: "grid",
      gridTemplateColumns: `repeat(${cols}, 1fr)`,
      gridTemplateRows: `repeat(${rows}, 1fr)`,
    }}>
      {tiles}
    </div>
  );
}

function TopBar() {
  return (
    <div style={{
      height: "var(--toolbar-height)", flexShrink: 0,
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "0 16px", background: "var(--surface-app)", borderBottom: "1px solid var(--border-subtle)",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: "14px" }}>
        <span style={{ font: "var(--text-brand)", color: "var(--text-primary)" }}>Atlas</span>
        <span style={{ font: "var(--text-body-sm)", color: "var(--text-tertiary)" }}>Highland Siege</span>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: "20px" }}>
        {[["coins","428"],["wheat","1,204"],["trees","96"]].map(([icon,val]) => (
          <span key={icon} style={{ display: "flex", alignItems: "center", gap: "6px", color: "var(--text-secondary)" }}>
            <Icon name={icon.charAt(0).toUpperCase()+icon.slice(1)} size={15} />
            <span style={{ font: "var(--text-data-md)" }}>{val}</span>
          </span>
        ))}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
        <span style={{ font: "var(--text-data-lg)", color: "var(--accent-primary)" }}>TURN 14 · 03:41</span>
        <IconButton title="Settings" icon={<Icon name="Settings" />} />
      </div>
    </div>
  );
}

function Minimap() {
  return (
    <div style={{ position: "absolute", left: 16, bottom: 16 }}>
      <Panel title="Minimap" width="200px">
        <div style={{ position: "relative", width: "100%", height: "120px", borderRadius: "var(--radius-sm)", overflow: "hidden", background: "var(--olive-2)" }}>
          <div style={{ position: "absolute", inset: 0, background: "repeating-linear-gradient(45deg, var(--olive-2) 0 10px, var(--olive-3) 10px 20px)" }} />
          <div style={{ position: "absolute", inset: 0, background: "var(--gradient-vignette)" }} />
          <div style={{ position: "absolute", left: "62%", top: "40%", width: 8, height: 8, borderRadius: "50%", background: "var(--faction-player)", boxShadow: "0 0 0 2px var(--gray-1)" }} />
          <div style={{ position: "absolute", left: "30%", top: "60%", width: 8, height: 8, borderRadius: "50%", background: "var(--faction-enemy)", boxShadow: "0 0 0 2px var(--gray-1)" }} />
          <div style={{ position: "absolute", left: "20%", top: "68%", width: 46, height: 30, border: "1px solid var(--gray-10)", opacity: 0.7 }} />
        </div>
      </Panel>
    </div>
  );
}

function UnitInspector({ unit }) {
  return (
    <div style={{ position: "absolute", right: 16, top: 64 }}>
      <Panel title="Unit Inspector" actions={<IconButton size="sm" title="Close" icon={<Icon name="X" size={13}/>} />} width="260px">
        <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <StatusPill faction="player" label={unit.name} />
            <Badge tone="info">{unit.type}</Badge>
          </div>
          <StatMeter label="HP" value={unit.hp} max={100} tone="success" />
          <StatMeter label="Supply" value={unit.supply} max={100} tone="danger" />
          <StatMeter label="Morale" value={unit.morale} max={100} tone="info" />
          <div style={{ font: "var(--text-data-sm)", color: "var(--text-tertiary)" }}>
            Position ({unit.x}, {unit.y}) · {unit.moves} moves left
          </div>
          <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
            <Button size="sm" variant="primary" icon={<Icon name="Footprints" size={13}/>}>Move</Button>
            <Button size="sm" variant="secondary" icon={<Icon name="Swords" size={13}/>}>Attack</Button>
            <Button size="sm" variant="ghost" icon={<Icon name="ShieldHalf" size={13}/>}>Fortify</Button>
          </div>
        </div>
      </Panel>
    </div>
  );
}

function ActionBar({ tool, setTool }) {
  const tools = [
    ["select","MousePointer2"],["move","Footprints"],["attack","Swords"],["fortify","ShieldHalf"],["end","SkipForward"],
  ];
  return (
    <div style={{
      position: "absolute", bottom: 16, left: "50%", transform: "translateX(-50%)",
      display: "flex", gap: "4px", padding: "6px",
      background: "var(--surface-panel)", border: "1px solid var(--border-default)",
      borderRadius: "var(--radius-md)", boxShadow: "var(--shadow-md)",
    }}>
      {tools.slice(0,4).map(([key, icon]) => (
        <Tooltip key={key} label={key[0].toUpperCase()+key.slice(1)}>
          <IconButton icon={<Icon name={icon}/>} active={tool===key} onClick={()=>setTool(key)} />
        </Tooltip>
      ))}
      <div style={{ width: "1px", background: "var(--border-subtle)", margin: "4px 4px" }} />
      <Button size="sm" variant="primary" icon={<Icon name="SkipForward" size={14}/>}>End Turn</Button>
    </div>
  );
}

function Notifications() {
  return (
    <div style={{ position: "absolute", right: 16, top: 300, display: "flex", flexDirection: "column", gap: "8px", zIndex: 20 }}>
      <Toast tone="danger" title="Under Attack" message="Settlement 'Ashford' is being raided." />
    </div>
  );
}

function Demo() {
  const [tool, setTool] = React.useState("select");
  const unit = { name: "Infantry Co. B", type: "Infantry", hp: 78, supply: 12, morale: 64, x: 42, y: 17, moves: 2 };
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <TopBar />
      <div style={{ position: "relative", flex: 1, overflow: "hidden" }}>
        <TerrainMap />
        <div style={{ position: "absolute", inset: 0, background: "var(--gradient-vignette)" }} />
        <Minimap />
        <UnitInspector unit={unit} />
        <ActionBar tool={tool} setTool={setTool} />
        <Notifications />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
