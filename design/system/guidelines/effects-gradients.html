<!-- @dsCard group="Foundations" viewport="700x180" name="Fog / Vignette gradients" subtitle="the ONLY gradients in Atlas — map/minimap edges only" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;background:var(--surface-canvas);padding:20px;box-sizing:border-box;display:flex;gap:16px;}
  .box{width:200px;height:140px;border-radius:var(--radius-md);position:relative;overflow:hidden;background:var(--olive-3);}
  .fog{position:absolute;left:0;right:0;bottom:0;height:70%;background:var(--gradient-fog-edge);}
  .vig{position:absolute;inset:0;background:var(--gradient-vignette);}
  .lbl{position:absolute;bottom:8px;left:8px;font:var(--text-label);color:var(--gray-10);z-index:2;}
</style></head>
<body>
  <div class="box"><div class="fog"></div><div class="lbl">fog-edge</div></div>
  <div class="box"><div class="vig"></div><div class="lbl">vignette</div></div>
</body></html>
