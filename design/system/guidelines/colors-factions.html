<!-- @dsCard group="Colors" viewport="700x150" name="Factions" subtitle="Player / ally / enemy / neutral status dots" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;background:var(--surface-panel);font-family:var(--font-sans);display:flex;align-items:center;height:150px;}
  .wrap{display:flex;gap:28px;padding:0 28px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .dot{width:28px;height:28px;border-radius:50%;}
  .lbl{font:var(--text-label);color:var(--text-tertiary);letter-spacing:var(--text-tracking-wide);text-transform:uppercase;}
</style></head>
<body><div class="wrap">
  <div class="item"><div class="dot" style="background:var(--faction-player)"></div><div class="lbl">Player</div></div>
  <div class="item"><div class="dot" style="background:var(--faction-ally)"></div><div class="lbl">Ally</div></div>
  <div class="item"><div class="dot" style="background:var(--faction-enemy)"></div><div class="lbl">Enemy</div></div>
  <div class="item"><div class="dot" style="background:var(--faction-neutral)"></div><div class="lbl">Neutral</div></div>
</div></body></html>
