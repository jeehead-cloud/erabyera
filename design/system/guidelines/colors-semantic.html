<!-- @dsCard group="Colors" viewport="700x170" name="Semantic — Info / Success / Danger" subtitle="Cyan (info/friendly), olive (success/terrain), rust (danger/hostile)" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;background:var(--surface-app);font-family:var(--font-sans);}
  .row{display:flex;gap:8px;padding:12px;box-sizing:border-box;}
  .grp{flex:1;display:flex;flex-direction:column;gap:4px;}
  .sw{height:44px;border-radius:var(--radius-sm);display:flex;align-items:center;padding:0 10px;}
  .sw span{font:var(--text-data-sm);}
</style></head>
<body>
<div class="row">
  <div class="grp">
    <div class="sw" style="background:var(--cyan-1)"><span style="color:var(--gray-9)">cyan-1</span></div>
    <div class="sw" style="background:var(--cyan-2)"><span style="color:var(--gray-9)">cyan-2</span></div>
    <div class="sw" style="background:var(--cyan-3)"><span style="color:var(--gray-1)">cyan-3</span></div>
    <div class="sw" style="background:var(--cyan-4)"><span style="color:var(--gray-1)">cyan-4 · info</span></div>
    <div class="sw" style="background:var(--cyan-5)"><span style="color:var(--gray-1)">cyan-5</span></div>
  </div>
  <div class="grp">
    <div class="sw" style="background:var(--olive-1)"><span style="color:var(--gray-9)">olive-1</span></div>
    <div class="sw" style="background:var(--olive-2)"><span style="color:var(--gray-9)">olive-2</span></div>
    <div class="sw" style="background:var(--olive-3)"><span style="color:var(--gray-1)">olive-3</span></div>
    <div class="sw" style="background:var(--olive-4)"><span style="color:var(--gray-1)">olive-4 · success</span></div>
    <div class="sw" style="background:var(--olive-5)"><span style="color:var(--gray-1)">olive-5</span></div>
  </div>
  <div class="grp">
    <div class="sw" style="background:var(--red-1)"><span style="color:var(--gray-9)">red-1</span></div>
    <div class="sw" style="background:var(--red-2)"><span style="color:var(--gray-9)">red-2</span></div>
    <div class="sw" style="background:var(--red-3)"><span style="color:var(--gray-1)">red-3</span></div>
    <div class="sw" style="background:var(--red-4)"><span style="color:var(--gray-1)">red-4 · danger</span></div>
    <div class="sw" style="background:var(--red-5)"><span style="color:var(--gray-1)">red-5</span></div>
  </div>
</div>
</body></html>
