<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals" subtitle="Graphite shell — canvas → panel → border → text" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;background:var(--surface-app);font-family:var(--font-sans);}
  .row{display:flex;gap:0;}
  .sw{flex:1;height:100px;display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;}
  .sw span{font:var(--text-data-sm);color:var(--text-tertiary);}
  .wrap{padding:12px;}
</style></head>
<body><div class="wrap">
<div class="row">
  <div class="sw" style="background:var(--gray-1)"><span>gray-1</span></div>
  <div class="sw" style="background:var(--gray-2)"><span>gray-2</span></div>
  <div class="sw" style="background:var(--gray-3)"><span>gray-3</span></div>
  <div class="sw" style="background:var(--gray-4)"><span>gray-4</span></div>
  <div class="sw" style="background:var(--gray-5)"><span>gray-5</span></div>
  <div class="sw" style="background:var(--gray-6)"><span>gray-6</span></div>
  <div class="sw" style="background:var(--gray-7)"><span>gray-7</span></div>
  <div class="sw" style="background:var(--gray-8);color:var(--gray-1)"><span style="color:var(--gray-1)">gray-8</span></div>
  <div class="sw" style="background:var(--gray-9);color:var(--gray-1)"><span style="color:var(--gray-1)">gray-9</span></div>
  <div class="sw" style="background:var(--gray-10);color:var(--gray-1)"><span style="color:var(--gray-1)">gray-10</span></div>
</div>
</div></body></html>
